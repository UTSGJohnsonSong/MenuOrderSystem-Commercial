services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: menuapp
      POSTGRES_USER: menuapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在 .env 里设置 DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menuapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        # 备案号是构建期固化的（NEXT_PUBLIC_*），改了 .env 里的值要 --build 重新构建才生效
        NEXT_PUBLIC_ICP_NUMBER: ${NEXT_PUBLIC_ICP_NUMBER:-}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://menuapp:${DB_PASSWORD}@db:5432/menuapp
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMS_CONSOLE_IN_PROD: ${SMS_CONSOLE_IN_PROD:-}
      ADMIN_PHONES: ${ADMIN_PHONES:-}
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:-}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:-}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-}
      NEXT_PUBLIC_ICP_NUMBER: ${NEXT_PUBLIC_ICP_NUMBER:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:3000:3000"   # 只监听本机，由 Nginx 对外提供 443

volumes:
  pgdata:
  uploads:
